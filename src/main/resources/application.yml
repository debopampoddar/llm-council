spring:
  application:
    name: llm-council
  ai:
    # Spring AI auto-config eagerly creates provider beans. Placeholder keys let
    # the app boot for local/mock profiles; real OCI/OpenAI-compatible runs must
    # override these with valid runtime credentials.
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:${OCA_LLM_API_TOKEN:unused-development-placeholder}}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:${OCA_LLM_BASE_URL:https://api.openai.com}}
      chat:
        completions-path: ${SPRING_AI_OPENAI_CHAT_COMPLETIONS_PATH:/v1/chat/completions}
        options:
          model: ${OCA_LLM_MODEL:gpt-5.4}
          temperature: 0.2
    anthropic:
      api-key: ${SPRING_AI_ANTHROPIC_API_KEY:unused-development-placeholder}
    ollama:
      # The local provider uses this URL for direct Ollama /api/chat calls.
      # Use http://ollama:11434 inside full Docker Compose. Use the default when
      # the Java service runs on the host next to a native Ollama process.
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${LLM_COUNCIL_LOCAL_MODEL:llama3.1:8b}
          temperature: 0.3
          num-ctx: ${SPRING_AI_OLLAMA_NUM_CTX:4096}
          num-thread: ${SPRING_AI_OLLAMA_NUM_THREAD:0}
          keep_alive: ${SPRING_AI_OLLAMA_KEEP_ALIVE:10m}
    vertex:
      ai:
        gemini:
          # Google Cloud project and region for Vertex AI Gemini.
          # Requires Application Default Credentials (ADC):
          #   gcloud auth application-default login
          # Or a service account JSON:
          #   GOOGLE_APPLICATION_CREDENTIALS=/path/to/sa.json
          project-id: ${GOOGLE_CLOUD_PROJECT:}
          location: ${GOOGLE_CLOUD_LOCATION:us-central1}
          chat:
            options:
              model: ${COUNCIL_GEMINI_MODEL:gemini-2.5-flash}
              temperature: 0.3
server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
logging:
  level:
    com.debopam.llmcouncil.model.OllamaDirectModelClient: ${LLM_COUNCIL_OLLAMA_LOG_LEVEL:INFO}

council:
  # Never silently convert a real profile into mock output. The explicit mock
  # profile remains available for tests and local smoke checks.
  allowMockFallback: false

  # Retry configuration for transient model failures (PROVIDER_UNAVAILABLE,
  # MODEL_TIMEOUT). Per-model overrides are supported via the model entry.
  # Defaults (applied when not specified per model):
  #   retryMaxAttempts: 2      — number of retry attempts after the initial call
  #   retryBaseDelayMs: 1000   — base delay in ms; doubled on each retry with jitter

  # Provider auto-detection: cloud providers (OpenAI, Anthropic, Gemini) activate
  # automatically when their API key or GCP project ID is set to a real value.
  # No explicit "enabled" flags needed. Placeholder keys are detected and ignored.
  # To activate a provider, just set its credential:
  #   SPRING_AI_OPENAI_API_KEY=sk-...          → OpenAI active
  #   SPRING_AI_ANTHROPIC_API_KEY=sk-ant-...   → Anthropic active
  #   GOOGLE_CLOUD_PROJECT=my-project          → Gemini/Vertex AI active
  # Ollama is always available (local, no credentials required).

  persistence:
    artifactBasePath: ${LLM_COUNCIL_ARTIFACT_PATH:${user.home}/.llm-council/runs}

  health:
    provider-timeout-seconds: ${LLM_COUNCIL_PROVIDER_HEALTH_TIMEOUT_SECONDS:5}
  runtime:
    # Demo-safe default: one active background council run at a time. Increase
    # only when the host and model runtime can handle parallel generations.
    max-concurrent-runs: ${LLM_COUNCIL_MAX_CONCURRENT_RUNS:1}
    chat-recent-turn-count: ${LLM_COUNCIL_CHAT_RECENT_TURN_COUNT:4}

  models:
    # Local Ollama models. The direct Ollama adapter uses the configured base URL
    # and applies providerModelId to each /api/chat request.
    - id: local-llama3
      provider: ollama
      providerModelId: ${LLM_COUNCIL_LOCAL_MODEL:llama3.1:8b}
      defaultOutputTokens: ${LLM_COUNCIL_LOCAL_OUTPUT_TOKENS:1200}
      temperature: 0.3
      timeoutSeconds: ${LLM_COUNCIL_LOCAL_TIMEOUT_SECONDS:240}
      role: MEMBER
      councilRole: PROPOSER         # default debate persona
      modelFamily: llama            # architecture family for diversity check
    - id: local-mistral
      provider: ollama
      providerModelId: ${LLM_COUNCIL_LOCAL_ALT_MODEL:mistral:7b}
      defaultOutputTokens: ${LLM_COUNCIL_LOCAL_ALT_OUTPUT_TOKENS:1200}
      temperature: 0.35
      timeoutSeconds: ${LLM_COUNCIL_LOCAL_TIMEOUT_SECONDS:240}
      role: MEMBER
      councilRole: CRITIC           # adversarial devil's advocate persona
      modelFamily: mistral          # different family from llama
    - id: local-chair
      provider: ollama
      providerModelId: ${LLM_COUNCIL_LOCAL_CHAIR_MODEL:llama3.1:8b}
      defaultOutputTokens: ${LLM_COUNCIL_LOCAL_CHAIR_OUTPUT_TOKENS:1800}
      temperature: 0.2
      timeoutSeconds: ${LLM_COUNCIL_LOCAL_TIMEOUT_SECONDS:240}
      role: CHAIR
      councilRole: SYNTHESIZER      # bridge-builder persona for the chair
      modelFamily: llama

    # OCI/OpenAI-compatible logical model. Configure Spring AI OpenAI base URL
    # and key externally for Oracle Code Assist LiteLLM, OCI, or another
    # compatible endpoint.
    - id: oci-gpt-5-4
      provider: openai-compatible
      providerModelId: ${OCA_LLM_MODEL:gpt-5.4}
      defaultOutputTokens: 2200
      temperature: 0.2
      timeoutSeconds: 120
      role: CHAIR
      councilRole: SYNTHESIZER
      modelFamily: gpt
    - id: oci-reviewer
      provider: openai-compatible
      providerModelId: ${OCA_LLM_REVIEW_MODEL:gpt-5.4}
      defaultOutputTokens: 1800
      temperature: 0.2
      timeoutSeconds: 120
      role: VALIDATOR
      councilRole: CRITIC
      modelFamily: gpt

    # Explicit test-only mocks.
    - id: mock-member
      provider: mock
      providerModelId: mock-member
      defaultOutputTokens: 800
      temperature: 0.1
      timeoutSeconds: 30
      role: MEMBER
      testOnly: true
      councilRole: PROPOSER
      modelFamily: mock
    - id: mock-chair
      provider: mock
      providerModelId: mock-chair
      defaultOutputTokens: 800
      temperature: 0.1
      timeoutSeconds: 30
      role: CHAIR
      testOnly: true
      councilRole: SYNTHESIZER
      modelFamily: mock

    # ── Gemini / Vertex AI models ──────────────────────────────────────
    # Activate with: COUNCIL_GEMINI_ENABLED=true
    # Requires GCP authentication:
    #   gcloud auth application-default login
    # Or: GOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json
    - id: gemini-flash
      provider: gemini
      providerModelId: ${COUNCIL_GEMINI_MODEL:gemini-2.5-flash}
      defaultOutputTokens: 2000
      temperature: 0.3
      timeoutSeconds: 120
      role: MEMBER
      councilRole: PROPOSER
      modelFamily: gemini
    - id: gemini-pro
      provider: gemini
      providerModelId: ${COUNCIL_GEMINI_PRO_MODEL:gemini-2.5-pro}
      defaultOutputTokens: 2200
      temperature: 0.2
      timeoutSeconds: 180
      role: CHAIR
      councilRole: SYNTHESIZER
      modelFamily: gemini

    # ── Anthropic models ───────────────────────────────────────────────
    # Activate with: COUNCIL_ANTHROPIC_ENABLED=true
    # Requires: SPRING_AI_ANTHROPIC_API_KEY=sk-ant-...
    - id: anthropic-sonnet
      provider: anthropic
      providerModelId: ${COUNCIL_ANTHROPIC_MODEL:claude-sonnet-4-20250514}
      defaultOutputTokens: 2000
      temperature: 0.3
      timeoutSeconds: 120
      role: MEMBER
      councilRole: CRITIC
      modelFamily: claude
    - id: anthropic-opus
      provider: anthropic
      providerModelId: ${COUNCIL_ANTHROPIC_CHAIR_MODEL:claude-sonnet-4-20250514}
      defaultOutputTokens: 2200
      temperature: 0.2
      timeoutSeconds: 180
      role: CHAIR
      councilRole: SYNTHESIZER
      modelFamily: claude

    # ── Direct OpenAI models ───────────────────────────────────────────
    # Activate with: COUNCIL_OPENAI_ENABLED=true
    # Requires: SPRING_AI_OPENAI_API_KEY=sk-...
    - id: openai-gpt
      provider: openai
      providerModelId: ${COUNCIL_OPENAI_MODEL:gpt-4o}
      defaultOutputTokens: 2000
      temperature: 0.3
      timeoutSeconds: 120
      role: MEMBER
      councilRole: PROPOSER
      modelFamily: gpt

  profiles:
    default:
      displayName: Local balanced council
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: local-quick
        BALANCED: local-balanced
        RIGOROUS: local-rigorous
    local:
      displayName: Local Ollama council
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: local-quick
        BALANCED: local-balanced
        RIGOROUS: local-rigorous
    oci:
      displayName: OCI/OpenAI-compatible council
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: oci-quick
        BALANCED: oci-balanced
        RIGOROUS: oci-rigorous
    hybrid:
      displayName: Local plus OCI council
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: hybrid-quick
        BALANCED: hybrid-balanced
        RIGOROUS: hybrid-rigorous
    mock:
      displayName: Mock test council
      testOnly: true
      defaultDepth: QUICK
      depthPolicies:
        QUICK: mock-quick
        BALANCED: mock-balanced
        RIGOROUS: mock-rigorous
    # ── Gemini profile: uses only Gemini models ──
    gemini:
      displayName: Google Gemini council
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: gemini-quick
        BALANCED: gemini-balanced
        RIGOROUS: gemini-rigorous
    # ── Multi-cloud profile: maximum diversity across providers ──
    multi-cloud:
      displayName: Multi-cloud council (Ollama + Gemini + Anthropic/OpenAI)
      testOnly: false
      defaultDepth: BALANCED
      depthPolicies:
        QUICK: multi-cloud-quick
        BALANCED: multi-cloud-balanced
        RIGOROUS: multi-cloud-rigorous

  policies:
    local-quick:
      protocolId: quick
      memberModelIds: [local-llama3]
      chairModelId: local-chair
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    local-balanced:
      protocolId: balanced
      memberModelIds: [local-llama3, local-mistral]
      chairModelId: local-chair
      validatorModelId: local-chair
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    local-rigorous:
      protocolId: rigorous
      memberModelIds: [local-llama3, local-mistral, local-chair]
      chairModelId: local-chair
      validatorModelId: local-chair
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

    oci-quick:
      protocolId: quick
      memberModelIds: [oci-gpt-5-4]
      chairModelId: oci-gpt-5-4
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    oci-balanced:
      protocolId: balanced
      memberModelIds: [oci-gpt-5-4, oci-reviewer]
      chairModelId: oci-gpt-5-4
      validatorModelId: oci-reviewer
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    oci-rigorous:
      protocolId: rigorous
      memberModelIds: [oci-gpt-5-4, oci-reviewer]
      chairModelId: oci-gpt-5-4
      validatorModelId: oci-reviewer
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

    hybrid-quick:
      protocolId: quick
      memberModelIds: [local-llama3]
      chairModelId: oci-gpt-5-4
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    hybrid-balanced:
      protocolId: balanced
      memberModelIds: [local-llama3, local-mistral, oci-reviewer]
      chairModelId: oci-gpt-5-4
      validatorModelId: oci-reviewer
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    hybrid-rigorous:
      protocolId: rigorous
      memberModelIds: [local-llama3, local-mistral, oci-gpt-5-4, oci-reviewer]
      chairModelId: oci-gpt-5-4
      validatorModelId: oci-reviewer
      minimumSuccessfulDrafts: 3
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

    mock-quick:
      protocolId: quick
      memberModelIds: [mock-member]
      chairModelId: mock-chair
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    mock-balanced:
      protocolId: balanced
      memberModelIds: [mock-member, mock-chair]
      chairModelId: mock-chair
      validatorModelId: mock-chair
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    mock-rigorous:
      protocolId: rigorous
      memberModelIds: [mock-member, mock-chair]
      chairModelId: mock-chair
      validatorModelId: mock-chair
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

    # ── Gemini policies ──────────────────────────────────────────────
    gemini-quick:
      protocolId: quick
      memberModelIds: [gemini-flash]
      chairModelId: gemini-pro
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    gemini-balanced:
      protocolId: balanced
      memberModelIds: [gemini-flash, gemini-pro]
      chairModelId: gemini-pro
      validatorModelId: gemini-pro
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    gemini-rigorous:
      protocolId: rigorous
      memberModelIds: [gemini-flash, gemini-pro]
      chairModelId: gemini-pro
      validatorModelId: gemini-pro
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

    # ── Multi-cloud policies ─────────────────────────────────────────
    multi-cloud-quick:
      protocolId: quick
      memberModelIds: [local-llama3, gemini-flash]
      chairModelId: gemini-pro
      validatorModelId:
      minimumSuccessfulDrafts: 1
      minimumReviewsPerDraft: 0
      validationRequired: false
      allowPartial: true
    multi-cloud-balanced:
      protocolId: balanced
      memberModelIds: [local-llama3, local-mistral, gemini-flash, anthropic-sonnet]
      chairModelId: gemini-pro
      validatorModelId: anthropic-opus
      minimumSuccessfulDrafts: 2
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true
    multi-cloud-rigorous:
      protocolId: rigorous
      memberModelIds: [local-llama3, local-mistral, gemini-flash, anthropic-sonnet, openai-gpt]
      chairModelId: gemini-pro
      validatorModelId: anthropic-opus
      minimumSuccessfulDrafts: 3
      minimumReviewsPerDraft: 1
      validationRequired: true
      allowPartial: true

  protocols:
    quick:
      description: Fast low-cost council for smoke tests and low-stakes requests.
      orderedStages: [GENERATE, SYNTHESIZE]
      stageOptions: {}
    balanced:
      description: Default council with anonymized review, scoring, synthesis, and Fresh Eyes validation.
      orderedStages: [GENERATE, ANONYMIZE, REVIEW, SCORE, SYNTHESIZE, VALIDATE]
      stageOptions:
        SCORE:
          artifact-label: initial
        SYNTHESIZE:
          preserve-dissent: true
    rigorous:
      description: High-rigor council with debate, post-debate revision, re-review, second scoring, validation, and export.
      # Added REVISE (post-debate draft revision) and
      # REVIEW_POST_DEBATE (re-review incorporating debate arguments) stages.
      orderedStages: [GENERATE, ANONYMIZE, REVIEW, SCORE, DEBATE, REVISE, REVIEW_POST_DEBATE, SCORE, SYNTHESIZE, VALIDATE, EXPORT]
      stageOptions:
        SCORE:
          artifact-label: initial
        DEBATE:
          min-rounds: 2
          max-rounds: 3
          ks-convergence-threshold: 0.10
          debate-trigger-score-variance: 120.0
          force-run: false
          sycophancy-threshold: 0.70   # Jaccard similarity threshold for sycophancy warning
        SYNTHESIZE:
          preserve-dissent: true
        EXPORT:
          export-raw-artifacts: false
