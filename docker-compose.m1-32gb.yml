name: llm-council-m1-32gb

services:
  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - ollama-m1-data:/root/.ollama
    mem_limit: 22g
    cpus: 8.0
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  ollama-pull:
    image: ollama/ollama:latest
    platform: linux/arm64
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_COUNCIL_LOCAL_MODEL: ${LLM_COUNCIL_LOCAL_MODEL:-llama3.1:8b}
      LLM_COUNCIL_LOCAL_ALT_MODEL: ${LLM_COUNCIL_LOCAL_ALT_MODEL:-mistral:7b}
      LLM_COUNCIL_LOCAL_CHAIR_MODEL: ${LLM_COUNCIL_LOCAL_CHAIR_MODEL:-llama3.1:8b}
    command: >
      sh -c '
        ollama pull "${LLM_COUNCIL_LOCAL_MODEL:-llama3.1:8b}" &&
        ollama pull "${LLM_COUNCIL_LOCAL_ALT_MODEL:-mistral:7b}" &&
        if [ "${LLM_COUNCIL_LOCAL_CHAIR_MODEL:-llama3.1:8b}" != "${LLM_COUNCIL_LOCAL_MODEL:-llama3.1:8b}" ] &&
           [ "${LLM_COUNCIL_LOCAL_CHAIR_MODEL:-llama3.1:8b}" != "${LLM_COUNCIL_LOCAL_ALT_MODEL:-mistral:7b}" ]; then
          ollama pull "${LLM_COUNCIL_LOCAL_CHAIR_MODEL:-llama3.1:8b}";
        fi
      '
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    platform: linux/arm64
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      # Sized so the chair can hold a full rigorous council transcript.
      # 32 GB Apple Silicon: ~2 GiB KV cache per resident 8B model.
      SPRING_AI_OLLAMA_NUM_CTX: "16384"
      SPRING_AI_OLLAMA_NUM_THREAD: "0"
      SPRING_AI_OLLAMA_KEEP_ALIVE: 20m
      LLM_COUNCIL_LOCAL_MODEL: ${LLM_COUNCIL_LOCAL_MODEL:-llama3.1:8b}
      LLM_COUNCIL_LOCAL_ALT_MODEL: ${LLM_COUNCIL_LOCAL_ALT_MODEL:-mistral:7b}
      LLM_COUNCIL_LOCAL_CHAIR_MODEL: ${LLM_COUNCIL_LOCAL_CHAIR_MODEL:-llama3.1:8b}
      LLM_COUNCIL_LOCAL_OUTPUT_TOKENS: "1000"
      LLM_COUNCIL_LOCAL_ALT_OUTPUT_TOKENS: "1000"
      LLM_COUNCIL_LOCAL_CHAIR_OUTPUT_TOKENS: "1400"
      LLM_COUNCIL_LOCAL_TIMEOUT_SECONDS: "360"
      # Containers must bind all interfaces for the published port to work.
      # The app defaults to loopback because it has no authentication.
      LLM_COUNCIL_BIND_ADDRESS: "0.0.0.0"
      LLM_COUNCIL_ARTIFACT_PATH: /data/llm-council/runs
      LLM_COUNCIL_MAX_CONCURRENT_RUNS: "1"
      LLM_COUNCIL_CHAT_RECENT_TURN_COUNT: "4"
      SPRING_AI_OPENAI_API_KEY: ${SPRING_AI_OPENAI_API_KEY:-unused-development-placeholder}
      SPRING_AI_OPENAI_BASE_URL: ${SPRING_AI_OPENAI_BASE_URL:-https://api.openai.com}
      SPRING_AI_ANTHROPIC_API_KEY: ${SPRING_AI_ANTHROPIC_API_KEY:-unused-development-placeholder}
    volumes:
      - app-m1-artifacts:/data/llm-council
    mem_limit: 3g
    cpus: 2.0
    restart: unless-stopped

volumes:
  ollama-m1-data:
  app-m1-artifacts:
